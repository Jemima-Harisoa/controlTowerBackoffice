# Configuration de la base de données
# Ces valeurs sont surchargées par les variables d'environnement si elles existent:
# - POSTGRES_DB -> db.name
# - POSTGRES_USER -> db.username
# - POSTGRES_PASSWORD -> db.password
# - POSTGRES_PORT -> db.port
# - DB_HOST -> db.host (pour Docker)
db.driver=org.postgresql.Driver
db.host=localhost
db.port=5432
db.name=controltower
db.url=jdbc:postgresql://localhost:5432/controltower
db.username=controltower_user
db.password=controltower_pass_2024

# Configuration de l'application
app.name=Control Tower Back-Office
app.version=1.0.0

# Configuration de sécurité
security.session.timeout=1800
security.password.min.length=8

# Configuration des logs
logging.level=INFO
logging.file.path=/var/log/controltower/back-office.log
